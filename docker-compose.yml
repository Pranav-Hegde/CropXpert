version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:6.0-jammy
    container_name: crop_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # 2. Node/Express Backend API
  backend:
    build: ./Crop/Backend
    container_name: crop_backend_api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/Crop
      - JWT_SECRET=yourSuperSecretKey123
    depends_on:
      - mongodb
    restart: unless-stopped

  # 3. Python Recommendation API
  recommend:
    build: ./Crop/Recommend
    container_name: crop_recommend_api
    ports:
      - "5001:5001"
    restart: unless-stopped

  # 4. Python Carbon Footprint API
  carbon:
    build: ./Crop/CarbonFootprint
    container_name: crop_carbon_api
    ports:
      - "5002:5002"
    restart: unless-stopped

  # 5. React Frontend (served via Nginx)
  frontend:
    build:
      context: ./Crop/Frontend/frontend
      args:
        - REACT_APP_BACKEND_API_URL=http://localhost:5000
        - REACT_APP_RECOMMEND_API_URL=http://localhost:5001
        - REACT_APP_CARBON_API_URL=http://localhost:5002
    container_name: crop_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - recommend
      - carbon
    restart: unless-stopped

volumes:
  mongodb_data:
